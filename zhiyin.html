<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户管理系统 - 知音科技专用版</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0d; --surface: #111318; --surface2: #181c24; --border: #252c3a; 
    --accent: #00d4ff; --text: #e8ecf4; --text3: #4a5568; --danger: #ff4757; 
    --success: #2ed573; --warning: #ffa502; --unused: #a78bfa;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'JetBrains Mono', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 80px; overflow-y: scroll; }
  
  .header { position:sticky; top:0; z-index:100; background: rgba(10,11,13,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 10px 20px; display:flex; align-items:center; justify-content:space-between; }
  .logo { font-family:'Syne',sans-serif; font-weight:800; color: var(--accent); font-size: 1.2rem; }
  .sync-info { font-size: 10px; color: var(--text3); margin-left: 10px; }

  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--success); color: #000; padding: 8px 20px; border-radius: 4px; font-weight: bold; font-size: 12px; z-index: 9999; opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none; box-shadow: 0 4px 15px rgba(46, 213, 115, 0.4); }
  .toast.show { opacity: 1; transform: translate(-50%, 10px); }

  .stats-bar { display:grid; grid-template-columns:repeat(4, 1fr); gap:10px; padding: 20px; width: 98%; max-width: 1600px; margin:0 auto; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px; cursor:pointer; }
  .stat-card.active { border: 2px solid var(--accent); background: var(--surface2); }
  .stat-label { font-size:10px; color:var(--text3); }
  .stat-value { font-family:'Syne',sans-serif; font-size:18px; font-weight: 800; }

  .unused-container { width: 98%; max-width: 1600px; margin: 0 auto 20px auto; padding: 0 20px; }
  .unused-box { background: rgba(167, 139, 250, 0.05); border: 1px dashed var(--unused); border-radius: 8px; padding: 12px; }
  .unused-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .unused-item { background: var(--surface2); border: 1px solid var(--border); padding: 3px 8px; border-radius: 4px; font-size: 11px; display: flex; align-items: center; gap: 6px; }

  .main-content { width: 98%; max-width: 1600px; margin:0 auto; padding:0 20px; }
  .table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow-x: auto; }
  table { width:100%; border-collapse:collapse; min-width: 1000px; table-layout: fixed; }
  th { background:var(--surface2); color:var(--text3); font-size:11px; padding:12px 10px; text-align:left; border-bottom:1px solid var(--border); }
  td { padding:10px; font-size:13px; border-bottom:1px solid var(--border); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  
  .editable { cursor: pointer; border-bottom: 1px dashed #444; }
  .edit-input { background: #000; border: 1px solid var(--accent); color: #fff; width: 100%; padding: 4px; border-radius: 4px; outline: none; }
  
  .btn { padding: 6px 12px; border-radius:4px; border:none; cursor:pointer; font-size:11px; font-weight:600; display:inline-flex; align-items:center; gap:4px; }
  .btn-primary { background:var(--accent); color:#000; }
  .btn-ghost { background:transparent; color:var(--text); border:1px solid var(--border); }
  
  .loading-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; display: none; align-items: center; justify-content: center; color: var(--accent); }
</style>
</head>
<body>

<div class="toast" id="toastMsg"></div>
<div class="loading-mask" id="loadingMask">☁️ 数据同步中...</div>

<header class="header">
  <div style="display:flex; align-items:center">
    <div class="logo">ZY FLOW <small style="font-size: 10px; color: var(--text3)">知音科技版</small></div>
    <span class="sync-info" id="syncStatus">连接中...</span>
  </div>
  <div style="display:flex; gap:8px;">
    <button class="btn btn-ghost" onclick="syncFromCloud()">🔄 刷新数据</button>
    <button class="btn btn-primary" onclick="addUser()">＋ 新增用户</button>
  </div>
</header>

<div class="stats-bar" id="statsBar"></div>

<div class="unused-container">
  <div class="unused-box">
    <div style="font-size: 11px; color: var(--unused); font-weight: bold;">🔑 待激活名额 (激活后自动归属知音科技)</div>
    <div class="unused-list" id="unusedGrid"></div>
  </div>
</div>

<main class="main-content">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th width="80">归属</th>
          <th width="70">窗口</th>
          <th width="140">用户</th>
          <th width="110">密码</th>
          <th width="100">微信</th>
          <th width="115">激活时间</th>
          <th width="115">到期日期</th>
          <th width="70">金额</th>
          <th width="80">状态</th>
          <th width="80">操作</th>
        </tr>
      </thead>
      <tbody id="userTableBody"></tbody>
    </table>
  </div>
</main>

<script>
const SUPABASE_URL = 'https://xlmnfzocrlqvbzzrdshr.supabase.co'; 
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhsbW5mem9jcmxxdmJ6enJkc2hyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5ODMyMjAsImV4cCI6MjA5MDU1OTIyMH0.Pvhl7JTz-FmOZ6J_aT8kBRve3ZrjOIIVVekr4jTZXUM';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const STORAGE_KEY = 'uf_v45_db';
const ROW_ID = 1;
const MY_OWNER = "知音科技"; // 强制归属标识

let db = { users: [], unused: [], trash: [] };
let currentFilter = 'all';

async function syncFromCloud() {
    document.getElementById('loadingMask').style.display = 'flex';
    try {
        const { data, error } = await supabaseClient.from('MainData').select('content').eq('id', ROW_ID).single();
        if (data && data.content) {
            db = typeof data.content === 'string' ? JSON.parse(data.content) : data.content;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
            document.getElementById('syncStatus').innerText = "✅ 已同步";
        }
        render();
    } catch (err) {
        document.getElementById('syncStatus').innerText = "❌ 访问受限";
    }
    document.getElementById('loadingMask').style.display = 'none';
}

async function saveToCloud() {
    const jsonStr = JSON.stringify(db);
    localStorage.setItem(STORAGE_KEY, jsonStr);
    try {
        await supabaseClient.from('MainData').upsert({ id: ROW_ID, content: jsonStr, updated_at: new Date() });
    } catch (err) { console.error(err); }
}

function render() {
    const container = document.getElementById('userTableBody');
    // 【核心逻辑】只显示知音科技的数据
    let displayData = db.users.filter(u => u.owner === MY_OWNER);
    
    if (currentFilter !== 'all') {
        displayData = displayData.filter(u => getStatus(u.expiry) === currentFilter);
    }

    displayData.sort((a,b) => new Date(a.expiry) - new Date(b.expiry));

    renderStats(displayData);
    renderUnusedGrid();

    container.innerHTML = '';
    displayData.forEach(u => {
        const tr = document.createElement('tr');
        const st = getStatus(u.expiry);
        tr.innerHTML = `
            <td style="color:var(--accent)">${u.owner}</td>
            <td class="editable" onclick="editField(this,'${u.id}','windows')">${u.windows || '100'}</td>
            <td class="editable" onclick="copyText('${u.username}')"><b>${u.username}</b></td>
            <td class="editable" onclick="editField(this,'${u.id}','password')">${u.password || '123456'}</td>
            <td class="editable" onclick="editField(this,'${u.id}','wechat')">${u.wechat || '-'}</td>
            <td>${u.activeTime || '-'}</td>
            <td class="editable" onclick="editField(this,'${u.id}','expiry','date')">${u.expiry}</td>
            <td class="editable" onclick="editField(this,'${u.id}','amount')">${u.amount || '32'}</td>
            <td><span style="color:var(--${st}); font-size:10px; font-weight:bold">${st==='expiring'?'⚠️到期':st==='active'?'✅有效':'❌过期'}</span></td>
            <td>
                <button class="btn btn-primary" style="padding:2px 8px" onclick="quickRenew('${u.id}')">续费</button>
            </td>
        `;
        container.appendChild(tr);
    });
}

function renderStats(data) {
    const s = {
        all: data.length,
        active: data.filter(u => getStatus(u.expiry) === 'active').length,
        expired: data.filter(u => getStatus(u.expiry) === 'expired').length,
        unused: db.unused.length
    };
    const labels = { all:'我的总数', active:'有效', expired:'已过期', unused:'待激活名额' };
    document.getElementById('statsBar').innerHTML = Object.keys(labels).map(k => `
        <div class="stat-card ${currentFilter===k?'active':''}" onclick="currentFilter='${k}';render()">
            <div class="stat-label">${labels[k]}</div>
            <div class="stat-value" style="color:var(--${k==='all'?'accent':k})">${s[k]}</div>
        </div>
    `).join('');
}

function renderUnusedGrid() {
    document.getElementById('unusedGrid').innerHTML = db.unused.map(u => `
        <div class="unused-item">
            <span>${u.username}</span>
            <button class="btn btn-primary" style="padding:0 4px; height:18px; font-size:9px" onclick="activate('${u.id}')">激活</button>
        </div>
    `).join('') || '<span style="font-size:11px;color:#666">暂无名额</span>';
}

function activate(id) {
    const u = db.unused.find(x => x.id === id);
    if(!u) return;
    const d = new Date(); 
    const activeTime = d.toISOString().slice(0,10);
    d.setMonth(d.getMonth() + 1);
    db.users.push({ 
        id: 'u_' + Date.now(), 
        username: u.username, 
        password: u.password, 
        owner: MY_OWNER, // 激活时强制设置为知音科技
        wechat: '-', 
        amount: '32', 
        windows: '100', 
        activeTime: activeTime, 
        expiry: d.toISOString().slice(0,10) 
    });
    db.unused = db.unused.filter(x => x.id !== id);
    saveToCloud().then(render);
}

function editField(el, id, field, type='text') {
    if(el.querySelector('input')) return;
    const oldVal = el.innerText;
    const input = document.createElement('input');
    input.type = type;
    input.className = 'edit-input';
    input.value = oldVal === '-' ? '' : oldVal;
    el.innerHTML = ''; el.appendChild(input); input.focus();
    input.onblur = () => {
        const val = input.value.trim() || '-';
        const user = db.users.find(u => u.id === id);
        if(user) user[field] = val;
        el.innerText = val;
        saveToCloud();
    };
}

function quickRenew(id) {
    const user = db.users.find(u => u.id === id);
    if (!user) return;
    let baseDate = new Date();
    const currentExpiry = new Date(user.expiry);
    if (currentExpiry > baseDate) baseDate = currentExpiry;
    baseDate.setDate(baseDate.getDate() + 30);
    user.expiry = baseDate.toISOString().slice(0, 10);
    saveToCloud().then(render);
}

function addUser() { 
    const n = prompt("输入 用户名 密码 (空格隔开):"); 
    if(n) { 
        const parts = n.trim().split(/\s+/);
        db.users.push({
            id: 'u_'+Date.now(), 
            username:parts[0], 
            password:parts[1]||'123456', 
            owner: MY_OWNER, // 新增时强制设置为知音科技
            wechat:'-', 
            amount: '32', 
            activeTime: new Date().toISOString().slice(0,10),
            windows: '100', 
            expiry: new Date().toISOString().slice(0,10)
        }); 
        saveToCloud().then(render); 
    }
}

function getStatus(date) {
    const d = Math.ceil((new Date(date) - new Date()) / 86400000);
    return d < 0 ? 'expired' : (d <= 3 ? 'expiring' : 'active');
}

function copyText(text) {
    navigator.clipboard.writeText(text);
    const toast = document.getElementById('toastMsg');
    toast.innerText = "复制成功: " + text;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
}

syncFromCloud();
</script>
</body>
</html>
