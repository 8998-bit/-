<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户管理系统 Cloud Sync v5.0</title>
<script src="https://cdn.jsdelivr.net/npm/hydrogen-js-sdk@2.2.3/dist/Bmob-2.2.3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0d; --surface: #111318; --surface2: #181c24; --border: #252c3a; 
    --accent: #f0a500; --text: #e8ecf4; --text3: #4a5568; --danger: #ff4757; 
    --success: #2ed573; --warning: #ffa502; --unused: #a78bfa;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'JetBrains Mono', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 80px; overflow-y: scroll; }
  
  .header { position:sticky; top:0; z-index:100; background: rgba(10,11,13,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 10px 20px; display:flex; align-items:center; justify-content:space-between; }
  .logo { font-family:'Syne',sans-serif; font-weight:800; color: var(--accent); font-size: 1.2rem; }
  .sync-info { font-size: 10px; color: var(--text3); margin-left: 10px; }

  /* 提示弹窗 UI */
  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--success); color: #000; padding: 8px 20px; border-radius: 4px; font-weight: bold; font-size: 12px; z-index: 9999; opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none; box-shadow: 0 4px 15px rgba(46, 213, 115, 0.4); }
  .toast.show { opacity: 1; transform: translate(-50%, 10px); }

  .stats-bar { display:grid; grid-template-columns:repeat(5, 1fr); gap:10px; padding: 20px; width: 98%; max-width: 1600px; margin:0 auto; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px; cursor:pointer; transition: 0.2s; }
  .stat-card.active { border: 2px solid var(--accent); background: var(--surface2); }
  .stat-label { font-size:10px; color:var(--text3); }
  .stat-value { font-family:'Syne',sans-serif; font-size:18px; font-weight: 800; }

  .unused-container { width: 98%; max-width: 1600px; margin: 0 auto 20px auto; padding: 0 20px; }
  .unused-box { background: rgba(167, 139, 250, 0.05); border: 1px dashed var(--unused); border-radius: 8px; padding: 12px; }
  .unused-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .unused-item { background: var(--surface2); border: 1px solid var(--border); padding: 3px 8px; border-radius: 4px; font-size: 11px; display: flex; align-items: center; gap: 6px; }

  .main-content { width: 98%; max-width: 1600px; margin:0 auto; padding:0 20px; }
  .table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow-x: auto; }
  table { width:100%; border-collapse:collapse; min-width: 1100px; table-layout: fixed; }
  th { background:var(--surface2); color:var(--text3); font-size:11px; padding:12px 10px; text-align:left; border-bottom:1px solid var(--border); }
  
  /* 单元格交互样式 */
  td { padding:10px; font-size:13px; border-bottom:1px solid var(--border); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .header-stat { color: var(--accent); font-weight: 800; margin-left: 4px; }
  .editable { cursor: pointer; border-bottom: 1px dashed #444; position: relative; }
  .editable:hover { background: rgba(240,165,0,0.05); color: var(--accent); }
  .editable:active { background: rgba(240,165,0,0.15); } /* 单击时的反馈 */
  
  .edit-input { background: #000; border: 1px solid var(--accent); color: #fff; width: 100%; padding: 4px; border-radius: 4px; font-family: inherit; outline: none; }
  .col-filter { width: 100%; background: #000; border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 10px; padding: 3px; margin-top: 5px; box-sizing: border-box; }
  
  .btn { padding: 6px 12px; border-radius:4px; border:none; cursor:pointer; font-size:11px; font-weight:600; display:inline-flex; align-items:center; justify-content: center; gap:4px; }
  .btn-sm { padding: 4px 8px; font-size: 10px; }
  .btn-primary { background:var(--accent); color:#000; }
  .btn-success { background:var(--success); color:#000; }
  .btn-danger { background:var(--danger); color:#fff; }
  .btn-ghost { background:transparent; color:var(--text); border:1px solid var(--border); }
  
  .trash-drawer { position: fixed; right: -450px; top: 0; width: 450px; max-width: 90vw; height: 100%; background: var(--surface); border-left: 1px solid var(--border); transition: 0.3s; z-index: 101; padding: 20px; box-shadow: -10px 0 30px rgba(0,0,0,0.8); display: flex; flex-direction: column; }
  .trash-drawer.open { right: 0; }
  .trash-list-wrap { flex: 1; overflow-y: auto; margin-top: 10px; padding-right: 5px; }
  .trash-item { background: var(--surface2); border: 1px solid var(--border); padding: 12px; border-radius: 6px; margin-bottom: 10px; font-size: 12px; display: flex; flex-direction: column; gap: 8px;}

  .batch-actions { background: var(--surface2); padding: 12px 20px; display: none; align-items: center; gap: 15px; position: fixed; bottom: 0; left: 0; right: 0; border-top: 2px solid var(--accent); z-index: 99; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 100; backdrop-filter: blur(2px); }
  .overlay.open { display: block; }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center; z-index:1000; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--surface); padding:20px; border-radius:8px; width:380px; border:1px solid var(--border); }
  
  .loading-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; display: none; align-items: center; justify-content: center; color: var(--accent); font-weight: bold; }
  
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }
</style>
</head>
<body>

<div class="toast" id="toastMsg">已复制</div>
<div class="loading-mask" id="loadingMask">☁️ 云端同步中...</div>

<header class="header">
  <div style="display:flex; align-items:center">
    <div class="logo">⚡ CLOUD FLOW <small style="font-size: 10px; color: var(--text3)">V5.0</small></div>
    <span class="sync-info" id="syncStatus">检查云端连接...</span>
  </div>
  <div style="display:flex; gap:8px;">
    <button class="btn btn-ghost" onclick="syncFromCloud()">🔄 刷新同步</button>
    <button class="btn btn-ghost" onclick="toggleTrash(true)">🗑️ 回收站 (<span id="trashCount">0</span>)</button>
    <button class="btn btn-ghost" onclick="downloadTemplate()">📥 导出模版</button>
    <label class="btn btn-ghost" style="cursor:pointer">📤 导入 Excel <input type="file" hidden accept=".xlsx, .xls" onchange="importExcel(this)"></label>
    <button class="btn btn-secondary" onclick="openMultiUnusedModal()" style="background:var(--unused); color:#000">＋ 批量增名额</button>
    <button class="btn btn-primary" onclick="addUser()">＋ 新增用户</button>
  </div>
</header>

<div class="stats-bar" id="statsBar"></div>

<div class="unused-container">
  <div class="unused-box">
    <div style="font-size: 11px; color: var(--unused); font-weight: bold;">🔑 名额库 (数据全端实时同步)</div>
    <div class="unused-list" id="unusedGrid"></div>
  </div>
</div>

<main class="main-content">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th width="40"><input type="checkbox" id="selectAll" onclick="toggleSelectAll('userTableBody', 'selectAll')"></th>
          <th width="90">归属<input type="text" class="col-filter" data-col="owner" oninput="render()"></th>
          <th width="70">窗口 <span class="header-stat" id="statWindows">/ 0</span><input type="text" class="col-filter" data-col="windows" oninput="render()"></th>
          <th width="140">用户 <span class="header-stat" id="statUsers">/ 0</span><input type="text" class="col-filter" data-col="username" oninput="render()"></th>
          <th width="110">密码<input type="text" class="col-filter" data-col="password" oninput="render()"></th>
          <th width="100">微信<input type="text" class="col-filter" data-col="wechat" oninput="render()"></th>
          <th width="100">咸鱼<input type="text" class="col-filter" data-col="xianyu" oninput="render()"></th>
          <th width="115">激活时间<input type="text" class="col-filter" data-col="activeTime" oninput="render()"></th>
          <th width="115">到期日期<input type="text" class="col-filter" data-col="expiry" oninput="render()"></th>
          <th width="70">金额 <span class="header-stat" id="statAmount">/ 0</span><input type="text" class="col-filter" data-col="amount" oninput="render()"></th>
          <th width="80">状态</th>
          <th width="110">操作</th>
        </tr>
      </thead>
      <tbody id="userTableBody"></tbody>
    </table>
  </div>
</main>

<div class="batch-actions" id="batchBar">
  <span id="batchCountText" style="font-size:12px; font-weight:bold; color: var(--accent)">已选中 0 位用户</span>
  <button class="btn btn-ghost" onclick="exportSelected('users')">📥 导出选中</button>
  <button class="btn btn-danger" onclick="batchAction('delete')">批量移至回收站</button>
  <button class="btn btn-ghost" onclick="cancelSelect()">取消选择</button>
</div>

<div class="overlay" id="overlay" onclick="toggleTrash(false)"></div>
<div class="trash-drawer" id="trashDrawer">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
    <h3 style="color:var(--danger)">🗑️ 回收站</h3>
    <button class="btn btn-ghost" onclick="toggleTrash(false)">关闭</button>
  </div>
  
  <div style="display:flex; gap:10px; margin-bottom:10px; padding-bottom:15px; border-bottom:1px solid var(--border); align-items:center;">
    <label style="font-size:12px; display:flex; align-items:center; gap:5px; cursor:pointer;">
        <input type="checkbox" id="selectAllTrash" onclick="toggleSelectAllTrash()"> 全选
    </label>
    <button class="btn btn-success btn-sm" onclick="batchRestoreTrash()">批量还原</button>
    <button class="btn btn-danger btn-sm" onclick="batchDeleteTrash()">永久删除</button>
  </div>

  <div class="trash-list-wrap" id="trashList"></div>
</div>

<div class="modal-overlay" id="multiUnusedModal">
  <div class="modal">
    <h3 style="font-size:14px; margin-bottom:10px; color:var(--unused)">批量新增名额</h3>
    <textarea id="multiUnusedInput" style="width:100%; height:180px; background:#000; border:1px solid var(--border); color:#fff; padding:10px; font-size:12px" placeholder="用户名 密码 (一行一个)"></textarea>
    <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:15px">
      <button class="btn btn-ghost" onclick="closeModal('multiUnusedModal')">取消</button>
      <button class="btn btn-secondary" onclick="confirmMultiUnused()" style="background:var(--unused)">确认添加</button>
    </div>
  </div>
</div>

<script>
// ================== 云同步配置 ==================
const BMOB_SECRET_KEY = "3c1505deff8c4856"; 
const BMOB_SAFE_TOKEN = "wwwewds21ds3ad13";

Bmob.initialize(BMOB_SECRET_KEY, BMOB_SAFE_TOKEN);

const STORAGE_KEY = 'uf_v45_db';
const DEFAULT_WINDOWS = '100';
const DEFAULT_AMOUNT = '32';
const DEFAULT_PWD = '123456';

let db = { users: [], unused: [], trash: [] };
let currentFilter = 'all';
let newlyActivatedId = null; 

// ================== 辅助交互功能 ==================
function showToast(msg) {
    const toast = document.getElementById('toastMsg');
    toast.innerText = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
}

// 兼容多种浏览器的文本复制引擎
function copyToClipboard(text) {
    if (!text || text === '-' || text.trim() === '') return;
    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(() => showToast('已复制: ' + text));
    } else {
        const input = document.createElement('textarea');
        input.value = text;
        document.body.appendChild(input);
        input.select();
        try {
            document.execCommand('copy');
            showToast('已复制: ' + text);
        } catch (err) {
            console.error('复制失败', err);
        }
        document.body.removeChild(input);
    }
}

// ─────────────────── 云同步引擎 ───────────────────
async function syncFromCloud() {
    showLoading(true);
    try {
        const query = Bmob.Query("MainData");
        const res = await query.find();
        if (res && res.length > 0) {
            db = JSON.parse(res[0].content);
            db.cloudId = res[0].objectId;
            localStorage.setItem(STORAGE_KEY, res[0].content);
            document.getElementById('syncStatus').innerText = "✅ 云端已同步";
        } else {
            const local = localStorage.getItem(STORAGE_KEY);
            if(local) {
                db = JSON.parse(local);
                await saveToCloud();
            } else {
                document.getElementById('syncStatus').innerText = "ℹ️ 云端为空，请添加数据";
            }
        }
        render();
    } catch (err) {
        document.getElementById('syncStatus').innerText = "❌ 同步失败";
        console.error(err);
        const local = localStorage.getItem(STORAGE_KEY);
        if(local) db = JSON.parse(local);
        render();
    }
    showLoading(false);
}

async function saveToCloud() {
    document.getElementById('syncStatus').innerText = "☁️ 正在上传...";
    const jsonStr = JSON.stringify({ users: db.users, unused: db.unused, trash: db.trash });
    localStorage.setItem(STORAGE_KEY, jsonStr);
    
    try {
        const query = Bmob.Query("MainData");
        if (db.cloudId) {
            query.set("id", db.cloudId);
            query.set("content", jsonStr);
            await query.save();
        } else {
            query.set("content", jsonStr);
            const res = await query.save();
            db.cloudId = res.objectId;
        }
        document.getElementById('syncStatus').innerText = "✅ 同步成功";
    } catch (err) {
        document.getElementById('syncStatus').innerText = "⚠️ 保存仅限本地";
        console.error(err);
    }
}

const save = (noSort = false) => {
    saveToCloud();
    render(noSort);
};

const showLoading = (s) => document.getElementById('loadingMask').style.display = s ? 'flex' : 'none';

// ─────────────────── 核心渲染引擎 ───────────────────
const getDays = (date) => Math.ceil((new Date(date) - new Date()) / 86400000);
function getStatus(date) {
    const d = getDays(date);
    return d < 0 ? 'expired' : (d <= 3 ? 'expiring' : 'active');
}

let renderTimer = null;
function render(noSort = false) {
    if(renderTimer) cancelAnimationFrame(renderTimer);
    
    const container = document.getElementById('userTableBody');
    let displayData = [...db.users];
    
    const filters = {};
    document.querySelectorAll('.col-filter').forEach(i => {
        if(i.value) filters[i.dataset.col] = i.value.toLowerCase();
    });

    displayData = displayData.filter(u => {
        const sMatch = currentFilter === 'all' || getStatus(u.expiry) === currentFilter;
        const cMatch = Object.keys(filters).every(key => String(u[key] || '-').toLowerCase().includes(filters[key]));
        return sMatch && cMatch;
    });

    if(!noSort) {
        displayData.sort((a,b) => {
            if (a.id === newlyActivatedId) return -1;
            if (b.id === newlyActivatedId) return 1;
            return new Date(a.expiry) - new Date(b.expiry);
        });
    }

    const totalWin = displayData.reduce((s, u) => s + parseInt(u.windows || 0), 0);
    const totalAmt = displayData.reduce((s, u) => s + parseFloat(u.amount || 0), 0).toFixed(0);
    document.getElementById('statWindows').innerText = `/ ${totalWin}`;
    document.getElementById('statUsers').innerText = `/ ${displayData.length}`;
    document.getElementById('statAmount').innerText = `/ ${totalAmt}`;
    document.getElementById('trashCount').innerText = db.trash.length;

    renderStatsBar();
    renderUnusedGrid();

    container.innerHTML = '';
    let index = 0;
    const batchSize = 50;

    function doRender() {
        const fragment = document.createDocumentFragment();
        const end = Math.min(index + batchSize, displayData.length);
        
        for(; index < end; index++) {
            const u = displayData[index];
            const tr = document.createElement('tr');
            const st = getStatus(u.expiry);
            if(u.id === newlyActivatedId) tr.style.background = "rgba(240,165,0,0.15)";
            
            tr.innerHTML = `
                <td><input type="checkbox" class="user-cb" data-id="${u.id}" onclick="updateBatchBar()"></td>
                <td class="editable" data-f="owner">${u.owner || '-'}</td>
                <td class="editable" data-f="windows">${u.windows || DEFAULT_WINDOWS}</td>
                <td class="editable" data-f="username"><b>${u.username}</b></td>
                <td class="editable" data-f="password">${u.password || DEFAULT_PWD}</td>
                <td class="editable" data-f="wechat">${u.wechat||'-'}</td>
                <td class="editable" data-f="xianyu">${u.xianyu||'-'}</td>
                <td class="editable" data-f="activeTime">${u.activeTime || '-'}</td>
                <td class="editable" data-f="expiry">${u.expiry}</td>
                <td class="editable" data-f="amount" style="color:var(--accent)">${u.amount || DEFAULT_AMOUNT}</td>
                <td><span style="color:var(--${st}); font-size:10px; font-weight:bold">${st==='expiring'?'⚠️到期':st==='active'?'✅有效':'❌过期'}</span></td>
                <td>
                    <button class="btn btn-success btn-sm" onclick="quickRenew('${u.id}')">续费</button>
                    <button class="btn btn-ghost btn-sm" onclick="moveUserToTrash('${u.id}')">🗑️</button>
                </td>
            `;
            
            // ============== 核心交互：单击复制，双击修改 ==============
            tr.querySelectorAll('.editable').forEach(td => {
                let clickTimer = null;
                
                td.onclick = (e) => {
                    // 如果当前已经是输入框状态（正在修改），则阻断单击和复制
                    if(e.target.tagName === 'INPUT') return; 
                    
                    clearTimeout(clickTimer);
                    // 设定 250ms 的延迟，用来判断用户是不是想双击
                    clickTimer = setTimeout(() => {
                        copyToClipboard(td.innerText);
                    }, 250); 
                };
                
                td.ondblclick = (e) => {
                    if(e.target.tagName === 'INPUT') return;
                    clearTimeout(clickTimer); // 取消单击复制的执行
                    makeEditable(td, u.id, td.dataset.f); // 执行修改逻辑
                };
            });

            fragment.appendChild(tr);
        }
        container.appendChild(fragment);
        if(index < displayData.length) renderTimer = requestAnimationFrame(doRender);
    }
    doRender();
}

function renderStatsBar() {
  const s = {
    all: db.users.length, active: db.users.filter(u => getStatus(u.expiry) === 'active').length,
    expiring: db.users.filter(u => getStatus(u.expiry) === 'expiring').length,
    expired: db.users.filter(u => getStatus(u.expiry) === 'expired').length,
    unused: db.unused.length
  };
  const labels = { all:'总用户', active:'有效', expiring:'即将到期', expired:'已过期', unused:'未使用名额' };
  document.getElementById('statsBar').innerHTML = Object.keys(labels).map(k => `
    <div class="stat-card ${currentFilter===k?'active':''}" onclick="currentFilter='${k}';render()">
      <div class="stat-label">${labels[k]}</div>
      <div class="stat-value" style="color:var(--${k==='all'?'accent':k})">${s[k]}</div>
    </div>
  `).join('');
}

function renderUnusedGrid() {
  document.getElementById('unusedGrid').innerHTML = db.unused.map(u => `
    <div class="unused-item">
      <span>${u.username}</span>
      <button class="btn btn-primary" style="padding:0 4px; height:18px; font-size:9px" onclick="activate('${u.id}')">激活</button>
      <span style="cursor:pointer;color:var(--danger)" onclick="db.unused=db.unused.filter(x=>x.id!=='${u.id}');save()">×</span>
    </div>
  `).join('');
}

// ─────────────────── 数据修改逻辑 ───────────────────
function makeEditable(el, id, field) {
    const oldVal = el.innerText === '-' ? '' : el.innerText;
    const input = document.createElement('input');
    input.className = 'edit-input';
    if(field === 'expiry' || field === 'activeTime') input.type = 'date';
    input.value = oldVal;
    el.innerHTML = ''; el.appendChild(input); input.focus();
    input.onblur = () => {
        const val = input.value.trim() || (['windows','amount'].includes(field)?'0':'-');
        const user = db.users.find(u => u.id === id);
        if(user) {
            user[field] = val;
            newlyActivatedId = id;
        }
        save(); 
    };
    input.onkeydown = (e) => { if(e.key==='Enter') input.blur(); };
}

function activate(id) {
    const u = db.unused.find(x => x.id === id);
    if(!u) return;
    const d = new Date(); 
    const activeTime = d.toISOString().slice(0,10);
    
    let expiry = u.presetExpiry;
    if(!expiry) {
        d.setMonth(d.getMonth() + 1);
        expiry = d.toISOString().slice(0,10);
    }

    const newId = 'u_' + Date.now();
    newlyActivatedId = newId;
    db.users.push({ 
        id: newId, username: u.username, password: u.password, 
        owner: '-', wechat: '-', xianyu: '-', amount: DEFAULT_AMOUNT, windows: DEFAULT_WINDOWS, 
        activeTime: activeTime,
        expiry: expiry 
    });
    db.unused = db.unused.filter(x => x.id !== id);
    save();
}

function quickRenew(id) {
    const user = db.users.find(u => u.id === id);
    if (!user) return;
    let baseDate = new Date();
    const currentExpiry = new Date(user.expiry);
    if (currentExpiry > baseDate) baseDate = currentExpiry;
    baseDate.setDate(baseDate.getDate() + 30);
    user.expiry = baseDate.toISOString().slice(0, 10);
    newlyActivatedId = id; 
    save();
}

function addUser() { 
    const n = prompt("用户名 密码 (空格隔开):"); 
    if(n) { 
        const parts = n.trim().split(/\s+/);
        const id='u_'+Date.now(); newlyActivatedId=id;
        db.users.push({
            id, username:parts[0], password:parts[1]||DEFAULT_PWD, 
            owner:'-', wechat:'-', xianyu:'-', amount: DEFAULT_AMOUNT, 
            activeTime: new Date().toISOString().slice(0,10),
            windows: DEFAULT_WINDOWS, expiry:new Date().toISOString().slice(0,10)
        }); 
        save(); 
    }
}

function moveUserToTrash(id) {
    const idx = db.users.findIndex(u => u.id === id);
    if(idx > -1) {
        const user = db.users.splice(idx, 1)[0];
        const now = new Date();
        const dStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        user.deletedAt = dStr;
        db.trash.unshift(user); save();
    }
}

function toggleSelectAll(cid, mid) {
    const isChecked = document.getElementById(mid).checked;
    document.querySelectorAll(`#${cid} .user-cb`).forEach(cb => cb.checked = isChecked);
    updateBatchBar();
}

function updateBatchBar() {
    const count = document.querySelectorAll('#userTableBody .user-cb:checked').length;
    document.getElementById('batchBar').style.display = count > 0 ? 'flex' : 'none';
    document.getElementById('batchCountText').innerText = `已选中 ${count} 位用户`;
}

function cancelSelect() {
    document.getElementById('selectAll').checked = false;
    document.querySelectorAll('.user-cb').forEach(cb => cb.checked = false);
    updateBatchBar();
}

function batchAction(type) {
    const selectedIds = Array.from(document.querySelectorAll(`.user-cb:checked`)).map(cb => cb.dataset.id);
    if(selectedIds.length === 0) return;
    selectedIds.forEach(id => { if(type === 'delete') moveUserToTrash(id); });
    cancelSelect();
    save();
}

// ============== 导出与导入 ==============
function exportSelected() {
    const selectedIds = Array.from(document.querySelectorAll(`.user-cb:checked`)).map(cb => cb.dataset.id);
    if(selectedIds.length === 0) { alert('请先选择要导出的用户！'); return; }
    
    const data = db.users.filter(u => selectedIds.includes(u.id)).map(u => ({
        "归属": u.owner, "窗口数": u.windows, "用户名": u.username, "密码": u.password, "微信": u.wechat, "咸鱼": u.xianyu, "激活时间": u.activeTime, "金额": u.amount, "到期日期": u.expiry
    }));
    
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "导出数据");
    XLSX.writeFile(wb, `用户导出数据.xlsx`);
}

function downloadTemplate() {
    const ws = XLSX.utils.aoa_to_sheet([["归属","窗口数", "用户名", "密码", "微信", "咸鱼", "激活时间", "金额", "到期日期"]]);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "模版");
    XLSX.writeFile(wb, "导入模版.xlsx");
}

function confirmMultiUnused() {
    const input = document.getElementById('multiUnusedInput').value;
    const lines = input.split('\n').filter(line => line.trim());
    const currentYear = new Date().getFullYear();

    lines.forEach(line => {
        const parts = line.trim().split(/\s+/);
        const username = parts[0];
        const password = parts[1] || DEFAULT_PWD;
        let expiryDate = new Date().toISOString().slice(0, 10); 

        if (parts[2]) {
            let dateStr = parts[2].replace(/\//g, '-'); 
            const dateParts = dateStr.split('-');
            if (dateParts.length === 2) {
                dateStr = `${currentYear}-${dateParts[0].padStart(2, '0')}-${dateParts[1].padStart(2, '0')}`;
            }
            const d = new Date(dateStr);
            if (!isNaN(d.getTime())) {
                expiryDate = d.toISOString().slice(0, 10);
            }
        }

        db.unused.push({ 
            id: 'un_' + Date.now() + Math.random(), 
            username: username, 
            password: password,
            presetExpiry: expiryDate 
        });
    });

    save(); 
    closeModal('multiUnusedModal');
    document.getElementById('multiUnusedInput').value = ''; 
}

function openMultiUnusedModal() { document.getElementById('multiUnusedModal').classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function toggleTrash(s) { document.getElementById('trashDrawer').classList.toggle('open',s); document.getElementById('overlay').classList.toggle('open',s); if(s) renderTrash(); }

function renderTrash() {
    const listHtml = db.trash.map(u => `
        <div class="trash-item">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                    <input type="checkbox" class="trash-cb" value="${u.id}">
                    <b>${u.username}</b>
                </label>
                <span style="background:rgba(255,71,87,0.15); color:var(--danger); padding:3px 8px; border-radius:4px; font-size:10px; font-weight:bold;">删于: ${u.deletedAt}</span>
            </div>
            <div style="display:flex; justify-content:flex-end; gap:6px;">
                <button class="btn btn-ghost btn-sm" onclick="permanentlyDelete('${u.id}')" style="color:var(--danger); border-color:var(--danger)">直接删除</button>
                <button class="btn btn-success btn-sm" onclick="restore('${u.id}')">恢复该用户</button>
            </div>
        </div>
    `).join('');
    document.getElementById('trashList').innerHTML = listHtml || '<div style="text-align:center; padding:20px; color:var(--text3)">空空如也</div>';
    document.getElementById('selectAllTrash').checked = false;
}

function toggleSelectAllTrash() {
    const isChecked = document.getElementById('selectAllTrash').checked;
    document.querySelectorAll('.trash-cb').forEach(cb => cb.checked = isChecked);
}

function batchRestoreTrash() {
    const selected = Array.from(document.querySelectorAll('.trash-cb:checked')).map(cb => cb.value);
    if(selected.length === 0) return;
    selected.forEach(id => {
        const idx = db.trash.findIndex(u => u.id === id);
        if(idx > -1) db.users.push(db.trash.splice(idx, 1)[0]);
    });
    save(); renderTrash();
}

function batchDeleteTrash() {
    const selected = Array.from(document.querySelectorAll('.trash-cb:checked')).map(cb => cb.value);
    if(selected.length === 0) return;
    if(confirm(`确定要永久删除选中的 ${selected.length} 个用户吗？此操作无法恢复！`)) {
        db.trash = db.trash.filter(u => !selected.includes(u.id));
        save(); renderTrash();
    }
}

function permanentlyDelete(id) {
    if(confirm("确定永久删除此用户吗？")) {
        db.trash = db.trash.filter(u => u.id !== id);
        save(); renderTrash();
    }
}

function restore(id) {
    const idx = db.trash.findIndex(u => u.id === id);
    if(idx > -1) { db.users.push(db.trash.splice(idx, 1)[0]); save(); renderTrash(); }
}

// ============== 彻底修复 Excel 日期少一天问题 ==============
function formatExcelDate(val) {
    if (!val) return '-';
    
    // 1. 处理 Excel 底层原生的时间序列号（比如 45356）
    if (typeof val === 'number') {
        // 直接以国际标准零时区(UTC)和 1899-12-30 为基准叠加天数
        // 这样能 100% 避开所有本地电脑的时区干扰
        const date = new Date(Date.UTC(1899, 11, 30 + val)); 
        return date.toISOString().slice(0, 10);
    }

    // 2. 兜底处理：万一还是进来了 Date 对象，强制用本地时间截取
    if (val instanceof Date) {
        const y = val.getFullYear();
        const m = String(val.getMonth() + 1).padStart(2, '0');
        const d = String(val.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    // 3. 处理纯文本输入（比如手动输入 "3-5"）
    let str = String(val).trim();
    if (/^\d{1,2}[-/]\d{1,2}$/.test(str)) {
        const year = new Date().getFullYear();
        const parts = str.split(/[-/]/);
        return `${year}-${parts[0].padStart(2, '0')}-${parts[1].padStart(2, '0')}`;
    }
    
    // 规范化常见的 "2024/03/05" 为 "2024-03-05"
    str = str.replace(/\//g, '-');
    const parts = str.split('-');
    if (parts.length === 3) {
        return `${parts[0]}-${parts[1].padStart(2, '0')}-${parts[2].padStart(2, '0')}`.substring(0, 10);
    }
    return str.substring(0, 10);
}

function importExcel(input) {
    if(!input.files.length) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        const data = new Uint8Array(e.target.result);
        
        // 【关键修复点】：删除了 cellDates: true！
        // 拒绝让插件乱转时区，直接拿原始数字用我们的引擎算
        const workbook = XLSX.read(data, {type: 'array'}); 
        const firstSheetName = workbook.SheetNames[0];
        const json = XLSX.utils.sheet_to_json(workbook.Sheets[firstSheetName]);
        
        json.forEach(row => {
            db.users.push({ 
                id: 'u_' + Date.now() + Math.random(), 
                owner: row["归属"] || '-', 
                windows: row["窗口数"] || DEFAULT_WINDOWS, 
                username: row["用户名"], 
                password: row["密码"] || DEFAULT_PWD, 
                wechat: row["微信"] || '-', 
                xianyu: row["咸鱼"] || '-', 
                activeTime: formatExcelDate(row["激活时间"]),
                amount: row["金额"] || DEFAULT_AMOUNT, 
                expiry: formatExcelDate(row["到期日期"]) 
            });
        });
        save();
        input.value = ''; 
    };
    reader.readAsArrayBuffer(input.files[0]);
}
